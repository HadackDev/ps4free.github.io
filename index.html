<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PS4Free | HadackDev</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e17;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: #121724;
            border-radius: 28px;
            padding: 28px 24px 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid #2a3348;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a3348;
            padding-bottom: 16px;
        }

        .logo h1 {
            font-size: 2rem;
            color: #fff;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .logo h1 span {
            font-weight: 300;
        }

        .goldhen-badge {
            display: inline-block;
            background: #d4a017;
            color: #0a0e17;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .logo p {
            color: #8b95b0;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .lang-switch {
            display: flex;
            gap: 8px;
            background: #0d1119;
            padding: 4px;
            border-radius: 40px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #8b95b0;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 30px;
            transition: 0.2s;
        }

        .lang-btn.active {
            background: #2d3a5e;
            color: white;
        }

        .version {
            text-align: right;
            font-size: 0.7rem;
            color: #5a6582;
            margin-bottom: 24px;
        }

        .status-area {
            background: #0d1119;
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 24px;
            border-left: 3px solid #d4a017;
            font-size: 0.85rem;
            color: #b9c4e3;
        }

        .section-title {
            color: #b9c4e3;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        .fw-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }

        .fw-btn {
            background: #0f1420;
            border: 1px solid #2a3348;
            color: #d1d9ff;
            padding: 10px 6px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s ease;
        }

        .fw-btn:hover {
            background: #1e2740;
            border-color: #d4a017;
            transform: scale(1.02);
        }

        .footer {
            text-align: center;
            font-size: 0.65rem;
            color: #4a5572;
            margin-top: 8px;
            padding-top: 16px;
            border-top: 1px solid #1e2438;
        }

        @media (max-width: 550px) {
            .container { padding: 20px 16px; }
            .fw-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
            .fw-btn { padding: 8px 4px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>PS4<span>Free</span><span class="goldhen-badge">by HadackDev</span></h1>
            <p id="subtitle">WebKit exploit</p>
        </div>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="ru">RU</button>
        </div>
    </div>
    <div class="version" id="version">Version: 1.5.1 | GoldHen Loader</div>

    <div class="status-area" id="statusArea">
        <span id="statusText">✅ Ready. Select your firmware.</span>
    </div>

    <div class="section-title" id="sectionTitle">SELECT PS4 FIRMWARE</div>
    <div class="fw-grid" id="fwGrid"></div>

    <div class="footer" id="footer">⚡ For all firmwares 7.00 — 9.60 · Loads GoldHen from chronoss09 link</div>
</div>

<script>
    // Список всех поддерживаемых прошивок (как в оригинальном PSFree)
    const firmwares = [
        "7.00", "7.01", "7.02", "7.50", "7.51", "7.55",
        "8.00", "8.01", "8.03", "8.50", "8.52",
        "9.00", "9.03", "9.04", "9.50", "9.51", "9.60"
    ];

    // БАЗОВАЯ ССЫЛКА, КОТОРУЮ ВЫ ДАЛИ (тот самый рабочий механизм)
    // При клике на любую прошивку переход будет на этот URL.
    // Параметры p0 и p1 уже настроены на загрузку mira.js и goldhen1.js.
    const GOLDHEN_LAUNCHER_URL = "https://chronoss09.github.io/Goldhen-little/payload.html#p0=mira/mira.js&p1=goldhen1.js";

    // Переводы (EN / RU)
    const translations = {
        en: {
            subtitle: "WebKit exploit interface",
            version: "Version: 1.5.1 | GoldHen Loader",
            statusReady: "✅ Ready. Select your firmware.",
            statusRedirect: (fw) => `🚀 Loading GoldHen for FW ${fw}... Redirecting to exploit host.`,
            sectionTitle: "SELECT PS4 FIRMWARE",
            footer: "⚡ For all firmwares 7.00 — 9.60 · Loads GoldHen from chronoss09 link"
        },
        ru: {
            subtitle: "Веб-интерфейс эксплойта",
            version: "Версия: 1.5.1 | Загрузчик GoldHen",
            statusReady: "✅ Готово. Выберите вашу прошивку.",
            statusRedirect: (fw) => `🚀 Загрузка GoldHen для FW ${fw}... Перенаправление на хост с эксплойтом.`,
            sectionTitle: "ВЫБЕРИТЕ ПРОШИВКУ PS4",
            footer: "⚡ Для всех прошивок 7.00 — 9.60 · Загружает GoldHen через ссылку chronoss09"
        }
    };

    let currentLang = "en";

    // Элементы DOM
    const subtitleEl = document.getElementById("subtitle");
    const versionEl = document.getElementById("version");
    const sectionTitleEl = document.getElementById("sectionTitle");
    const footerEl = document.getElementById("footer");
    const statusTextEl = document.getElementById("statusText");
    const fwGrid = document.getElementById("fwGrid");

    // Функция обновления текстов интерфейса
    function setLanguage(lang) {
        currentLang = lang;
        const t = translations[lang];
        subtitleEl.textContent = t.subtitle;
        versionEl.textContent = t.version;
        sectionTitleEl.textContent = t.sectionTitle;
        footerEl.textContent = t.footer;
        
        // Меняем статус, только если он не в "custom" режиме (ожидание/ошибка)
        if (!statusTextEl.hasAttribute("data-custom")) {
            statusTextEl.innerHTML = t.statusReady;
        }
        
        // Обновляем активную кнопку языка
        document.querySelectorAll(".lang-btn").forEach(btn => {
            if (btn.getAttribute("data-lang") === lang) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }

    // Функция для временного изменения статуса
    function setStatusMessage(message, isError = false) {
        statusTextEl.setAttribute("data-custom", "true");
        statusTextEl.innerHTML = message;
        const statusArea = document.getElementById("statusArea");
        if (isError) {
            statusArea.style.borderLeftColor = "#ff5555";
        } else {
            statusArea.style.borderLeftColor = "#d4a017";
        }
        
        // Через 4 секунды возвращаем стандартный статус (если не было нового клика)
        setTimeout(() => {
            if (statusTextEl.getAttribute("data-custom") === "true") {
                statusTextEl.removeAttribute("data-custom");
                const t = translations[currentLang];
                statusTextEl.innerHTML = t.statusReady;
                statusArea.style.borderLeftColor = "#d4a017";
            }
        }, 4000);
    }

    // === ГЛАВНАЯ ФУНКЦИЯ: ЗАПУСК ЭКСПЛОЙТА ПРИ КЛИКЕ НА ЛЮБУЮ ПРОШИВКУ ===
    function launchGoldHen(firmware) {
        const t = translations[currentLang];
        
        // Показываем сообщение о перенаправлении
        setStatusMessage(t.statusRedirect(firmware));
        
        // Небольшая задержка, чтобы пользователь увидел статус, затем редирект
        setTimeout(() => {
            // ПРЯМОЙ ПЕРЕХОД ПО РАБОЧЕЙ ССЫЛКЕ
            // Именно так работает исходный хост: при переходе он запускает Webkit Exploit
            // и загружает goldhen1.js (как указано в #p0=... & p1=...)
            window.location.href = GOLDHEN_LAUNCHER_URL;
        }, 800);
    }

    // Построение кнопок для всех прошивок
    function buildFirmwareGrid() {
        fwGrid.innerHTML = "";
        firmwares.forEach(fw => {
            const btn = document.createElement("button");
            btn.className = "fw-btn";
            btn.textContent = fw;
            btn.addEventListener("click", (e) => {
                e.preventDefault();
                launchGoldHen(fw);   // при клике на ЛЮБУЮ версию — запускаем тот же URL
            });
            fwGrid.appendChild(btn);
        });
    }

    // Обработчики кнопок переключения языка
    document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            const lang = btn.getAttribute("data-lang");
            if (lang === "en" || lang === "ru") {
                setLanguage(lang);
            }
        });
    });

    // Инициализация страницы
    buildFirmwareGrid();
    setLanguage("en");   // стартовый язык — английский
</script>
</body>
</html>

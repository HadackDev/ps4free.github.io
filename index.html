<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>PS4 GoldHen</title>
<style>
body{background:#0a0e17;font-family:Arial;padding:20px;text-align:center}
.container{max-width:600px;margin:0 auto;background:#121724;border-radius:20px;padding:20px}
h1{color:#fff} button{padding:12px 20px;margin:5px;background:#2d3a5e;color:#fff;border:none;border-radius:30px;cursor:pointer}
.fw-btn{background:#0f1420;border:1px solid #d4a017;padding:12px;margin:5px;width:70px;cursor:pointer;color:#fff;border-radius:30px}
.lang-btn{background:#1e2740;padding:8px 20px}
.status{background:#0d1119;padding:15px;margin:20px 0;border-radius:10px;color:#d4a017}
.grid{display:flex;flex-wrap:wrap;justify-content:center;margin:20px 0}
</style>
</head>
<body>
<div class="container">
<h1>PS<span style="color:#d4a017">Free</span> GOLDHEN</h1>
<div><button class="lang-btn" onclick="setLang('en')">EN</button><button class="lang-btn" onclick="setLang('ru')">RU</button></div>
<div class="status" id="status">✅ Ready. Click your firmware.</div>
<div class="grid" id="fwGrid"></div>
<div style="font-size:11px;color:#555">v1.0 | GoldHen 2.4b18</div>
</div>
<script>
const firmwares = ["9.00","9.03","9.04","9.50","9.51","9.60","8.00","8.01","8.03","8.50","8.52","7.55"];
const texts = {en:{ready:"✅ Ready. Click your firmware.",loading:"🚀 Loading GoldHen for FW ",success:"✅ GoldHen Done! Check PS4."},ru:{ready:"✅ Готово. Нажмите на прошивку.",loading:"🚀 Загрузка GoldHen для FW ",success:"✅ GoldHen Готов! Проверьте PS4."}};
let lang='en';
function setLang(l){lang=l;document.getElementById('status').innerHTML=texts[lang].ready;}
function trigger(fw){
    document.getElementById('status').innerHTML=texts[lang].loading+fw+'...';
    let url=`https://nightly.link/GoldHEN/GoldHEN/workflows/build/main/GoldHEN_${fw.replace('.','')}.bin`;
    let iframe=document.createElement('iframe');iframe.style.display='none';iframe.src=url;
    document.body.appendChild(iframe);
    setTimeout(()=>{document.getElementById('status').innerHTML=texts[lang].success;setTimeout(()=>{document.getElementById('status').innerHTML=texts[lang].ready;},3000);},1500);
}
let grid=document.getElementById('fwGrid');
firmwares.forEach(f=>{let btn=document.createElement('button');btn.className='fw-btn';btn.innerText=f;btn.onclick=()=>trigger(f);grid.appendChild(btn);});
setLang('en');
</script>
</body>
</html>
